<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>upbit — AI-native Upbit CLI</title>
  <script>
    // Korean-first: redirect to ko.html by default, en.html for English speakers
    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    var isEnglish = lang.startsWith('en');
    window.location.replace(isEnglish ? 'en.html' : 'ko.html');
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=ko.html">
  </noscript>
</head>
<body>
  <p>Redirecting... <a href="ko.html">한국어</a> | <a href="en.html">English</a></p>
</body>
</html>
